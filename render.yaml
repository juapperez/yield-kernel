services:
  - type: web
    name: yieldkernel-backend
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: AI_PROVIDER
        value: groq
      - key: GROQ_API_KEY
        sync: false
      - key: WALLET_MNEMONIC
        sync: false
      - key: RPC_URL
        value: https://eth-mainnet.g.alchemy.com/v2/demo
      - key: CHAIN_ID
        value: 1
      - key: MAX_POSITION_SIZE_USDT
        value: 1000
      - key: MIN_APY_THRESHOLD
        value: 3.0
